name: CodSpeed (instrumentation)

# Cachegrind micro-benchmarks for instruction-count regression detection.
# Runs on master (establishing/updating the baseline) and on every PR (compared
# against that baseline), plus a manual trigger. Deterministic instruction
# counts run on shared CI runners and consume no CodSpeed macro-runner minutes,
# so per-PR is free. Wall-clock lives in the macro workflow (codspeed-macro.yml).

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codspeed:
    name: CodSpeed (micro regression detection)
    runs-on: ubuntu-latest
    # Non-gating until the CodSpeed app is connected to the repo (OIDC auth).
    continue-on-error: true
    permissions:
      contents: read   # actions/checkout
      id-token: write  # OIDC auth with CodSpeed — no token secret
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # setuptools_scm

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install pinned benchmark environment
      # Pinned ``[benchmarks]`` extra so Dependabot bumps → one CodSpeed delta each.
      run: |
        python -m pip install uv
        uv pip install --system -e ".[dev,benchmarks]"

    - name: Run benchmarks under CodSpeed
      uses: CodSpeedHQ/action@v4
      with:
        mode: simulation  # cachegrind instruction counts (required input in v4)
        # --codspeed-set simulation: trim to the cheap phases (cachegrind is the
        # slow, least-representative instrument); to_solver stays on memory+walltime.
        run: |
          pytest benchmarks/ --quick --codspeed --codspeed-set simulation
