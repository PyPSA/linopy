name: Test models

on:
  push:
    branches:
      - master
  pull_request:
    branches: ["*"]
  schedule:
    - cron: "0 5 * * *"

# Cancel any in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pypsa-eur:
    name: PyPSA-Eur
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - master
        # - latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v7
        with:
          repository: PyPSA/pypsa-eur
          ref: master

      - name: Check out latest release
        if: matrix.version == 'latest'
        run: |
          git fetch --tags
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1`)
          git checkout $latest_tag

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.68.1
          cache: true
          # Do not cache in branches
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}

      - name: Setup cache keys
        run: |
          echo "WEEK=$(date +'%Y%U')" >> $GITHUB_ENV # data and cutouts

      # Only run check if package is not pinned
      - name: Check if linopy package is pinned
        run: |
          grep_line=$(grep -- '${{ github.event.repository.name }} = ' pixi.toml)
          if [[ $grep_line == *"<* || $grep_line == *"==* ]]; then
              echo "pinned=true" >> $GITHUB_ENV
          else
              echo "pinned=false" >> $GITHUB_ENV
          fi

      - name: Setup secrets & cache dates
        if: env.pinned == 'false'
        run: |
          echo -ne "url: ${CDSAPI_URL}\nkey: ${CDSAPI_TOKEN}\n" > ~/.cdsapirc
          echo "week=$(date +'%Y%U')" >> $GITHUB_ENV # data and cutouts

      - uses: actions/cache@v5
        if: env.pinned == 'false'
        with:
          path: |
            data
            cutouts
          key: data-cutouts-${{ env.week }}

      - name: Install package from ref
        if: env.pinned == 'false'
        run: |
          pixi remove pypsa
          pixi remove linopy
          pixi add --pypi --git https://github.com/${{ github.repository }}.git ${{ github.event.repository.name }} --rev ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          pixi add --pypi pypsa

      - name: Run snakemake test workflows
        if: env.pinned == 'false'
        run: |
          pixi run integration-tests

      - name: Run unit tests
        if: env.pinned == 'false'
        run: |
          pixi run unit-tests

      - name: Upload artifacts
        if: env.pinned == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: results-pypsa-eur-${{ matrix.version }}
          path: |
            logs
            .snakemake/log
            results
          retention-days: 3

      - name: Show remaining disk space
        if: always()
        run: df -h
