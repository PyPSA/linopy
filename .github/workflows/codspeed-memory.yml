name: CodSpeed (memory, per-PR)

# Fast per-PR heap-allocation check on a GitHub runner — the always-on signal.
# A *solo* instrument run → one upload per (commit, environment), so nothing
# overwrites it. (CodSpeed records one run per (commit, environment); a second
# upload to the same environment supersedes the first, which is why simulation
# and memory must share one run on master — see codspeed.yml.)
#
# Skipped when the PR carries the ``trigger:benchmark`` label: that opt-in path
# runs the full simulation+memory suite (codspeed.yml), which already covers
# memory, so running this too would double-upload to the same environment.

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory:
    name: CodSpeed memory (per-PR)
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'trigger:benchmark') }}
    runs-on: ubuntu-latest
    # Non-gating: informational, never blocks a merge.
    continue-on-error: true
    permissions:
      contents: read   # actions/checkout
      id-token: write  # OIDC auth with CodSpeed — no token secret
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # setuptools_scm

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install pinned benchmark environment
      run: |
        python -m pip install uv
        uv pip install --system -e ".[dev,benchmarks]"

    - name: Run benchmarks under CodSpeed (memory)
      uses: CodSpeedHQ/action@v4
      with:
        mode: memory
        run: |
          pytest benchmarks/ --quick --codspeed
